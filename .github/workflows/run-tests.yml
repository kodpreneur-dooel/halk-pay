name: run-tests

on:
  push:
    branches:
      - main
      - master
      - work
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.2
            laravel: 11.*
            testbench: 9.*
            dependency-version: prefer-stable
          - php: 8.3
            laravel: 11.*
            testbench: 9.*
            dependency-version: prefer-stable
          - php: 8.2
            laravel: 12.*
            testbench: 10.*
            dependency-version: prefer-stable
          - php: 8.3
            laravel: 12.*
            testbench: 10.*
            dependency-version: prefer-stable

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.dependency-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" "illuminate/routing:${{ matrix.laravel }}" --no-interaction --no-update
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction

      - name: Run tests
        run: composer test
